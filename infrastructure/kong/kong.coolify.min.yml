_format_version: "3.0"

services:
  - name: tpm
    url: http://ta:3000
    routes:
      - name: tpm-route
        paths: ["/api/tpm"]
        strip_path: true

plugins:
  - name: cors
    config:
      origins: ["*"]
      methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      headers: [Accept, Authorization, Content-Type, X-Tenant-Id]
      max_age: 3600
