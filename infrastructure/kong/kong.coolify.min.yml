_format_version: "3.0"
_transform: true

services:
  - name: ta-service
    host: ta
    port: 3000
    protocol: http
    routes:
      - name: ta-route
        paths: ["/"]
        strip_path: false

plugins:
  - name: cors
    config:
      origins: ["*"]
      methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      headers: [Accept, Authorization, Content-Type, X-Tenant-Id]
      max_age: 3600
